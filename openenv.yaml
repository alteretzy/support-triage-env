name: support-triage-env
version: "1.0.0"
description: >
  A multi-step enterprise customer support triage environment where an AI agent
  reads support tickets, queries a simulated backend for context, and resolves
  or escalates tickets. Models a genuine real-world workflow used by companies
  like Zendesk, Intercom, and Freshdesk.
author: hoebusters
tags:
  - openenv
  - customer-support
  - triage
  - real-world
action_model: server.models:TriageAction
observation_model: server.models:TriageObservation
entrypoint: "server.app:app"
reward_range: [0.0, 1.0]
tasks:
  - name: easy
    description: "Route a simple, unambiguous refund request to the correct department."
  - name: medium
    description: "Diagnose a technical outage ticket using system logs before routing."
  - name: hard
    description: "Detect a social-engineering / phishing attempt disguised as a billing update and escalate to security — despite the user's insistence."
